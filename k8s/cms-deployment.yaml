apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cms-service
  template:
    metadata:
      labels:
        app: cms-service
    spec:
      containers:
      - name: cms
        image: tienda/cms-service:latest
        ports:
        - containerPort: 1337
        env:
        - name: DATABASE_CLIENT
          value: postgres
        - name: DATABASE_HOST
          value: postgres-service
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_NAME
          value: tienda_db
        - name: DATABASE_USERNAME
          value: tienda_user
        - name: DATABASE_PASSWORD
          value: tienda_pass
        - name: ADMIN_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: cms-secrets
              key: ADMIN_JWT_SECRET
        - name: API_TOKEN_SALT
          valueFrom:
            secretKeyRef:
              name: cms-secrets
              key: API_TOKEN_SALT
        - name: TRANSFER_TOKEN_SALT
          valueFrom:
            secretKeyRef:
              name: cms-secrets
              key: TRANSFER_TOKEN_SALT
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cms-service
spec:
  selector:
    app: cms-service
  ports:
    - protocol: TCP
      port: 1337
      targetPort: 1337
  type: ClusterIP
