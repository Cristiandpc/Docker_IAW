version: '3.9'

services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: tienda_db
    environment:
      POSTGRES_USER: tienda_user
      POSTGRES_PASSWORD: tienda_pass
      POSTGRES_DB: tienda_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tienda_user -d tienda_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices
    restart: unless-stopped

  # Microservicio de Productos
  products-service:
    build: ./services/products-service
    container_name: products_service
    environment:
      DB_USER: tienda_user
      DB_HOST: db
      DB_NAME: tienda_db
      DB_PASSWORD: tienda_pass
      DB_PORT: 5432
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/products-service:/app
      - /app/node_modules
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Microservicio de Órdenes
  orders-service:
    build: ./services/orders-service
    container_name: orders_service
    environment:
      DB_USER: tienda_user
      DB_HOST: db
      DB_NAME: tienda_db
      DB_PASSWORD: tienda_pass
      DB_PORT: 5432
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/orders-service:/app
      - /app/node_modules
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Microservicio de CMS (Strapi)
  cms-service:
    build: ./services/cms-service
    container_name: cms_service
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: tienda_db
      DATABASE_USERNAME: tienda_user
      DATABASE_PASSWORD: tienda_pass
      ADMIN_JWT_SECRET: cms-admin-secret-key-change-in-production
      API_TOKEN_SALT: cms-api-token-salt-change-in-production
      TRANSFER_TOKEN_SALT: cms-transfer-token-salt-change-in-production
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: development
    ports:
      - "1337:1337"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/cms-service:/app
      - cms_uploads:/app/public/uploads
      - /app/node_modules
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/_health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Reactivo
  frontend:
    build: ./frontend
    container_name: frontend_app
    environment:
      REACT_APP_API_URL: http://localhost/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway (Nginx)
  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - products-service
      - orders-service
      - frontend
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./api-gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - microservices
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  microservices:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  cms_uploads:
    driver: local