version: '3.8'

services:
  app:
    build: .
    volumes:
      - ./app:/var/www/html
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./app:/var/www/html
    depends_on:
      - app
    networks:
      - webnet

networks:
  webnet: